{% set python_min = "3.10" %}
{% set version = "0.13.0" %}

package:
  name: lintquarto
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/l/lintquarto/lintquarto-{{ version }}.tar.gz
  sha256: 8389695f226a35d98215e5f9b49e4738ab3af3872c80afbfacbc16b98903bed0

build:
  entry_points:
    - lintquarto = lintquarto.__main__:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - flit
    - pip
  run:
    - python >={{ python_min }}
    - toml
    - tree_sitter
    - tree-sitter-markdown
    - pyyaml

test:
  imports:
    - lintquarto
  commands:
    - pip check
    - lintquarto --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://lintquarto.github.io/lintquarto/
  summary: Package for running linters, static type checkers and code analysis tools on python code in quarto (.qmd) files.
  dev_url: https://github.com/lintquarto/lintquarto
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - amyheather
